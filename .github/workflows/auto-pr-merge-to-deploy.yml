# Feature branch push -> CI -> open PR to deploy (manual merge required)
name: Promote feature branches to deploy

on:
  push:
    branches-ignore:
      - main
      - deploy
  workflow_dispatch:
    inputs:
      branch:
        description: Feature branch to promote into deploy
        required: true
        type: string

concurrency:
  group: promote-to-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets:
      VITE_API_URL: ${{ secrets.VITE_API_URL }}
      VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

  open-pr-to-deploy:
    name: Open PR to deploy
    needs: ci
    if: needs.ci.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Resolve source branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR to deploy (no auto-merge)
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_BRANCH: ${{ steps.branch.outputs.name }}
          TARGET_BRANCH: deploy
        run: |
          set -euo pipefail
          chmod +x scripts/open-feature-pr-to-deploy.sh
          OUTPUT="$(scripts/open-feature-pr-to-deploy.sh)"
          printf '%s\n' "${OUTPUT}"
          if printf '%s\n' "${OUTPUT}" | grep -q '^pr_opened=false$'; then
            echo "pr_opened=false" >> "$GITHUB_OUTPUT"
          else
            echo "pr_opened=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "${OUTPUT}" | grep '^pr_url=' | cut -d= -f2- >> "$GITHUB_OUTPUT"
            printf '%s\n' "${OUTPUT}" | grep '^pr_number=' | cut -d= -f2- >> "$GITHUB_OUTPUT"
          fi

      - name: PR ready for review
        if: steps.pr.outputs.pr_opened == 'true'
        run: |
          echo "CI passed. Review and merge PR #${{ steps.pr.outputs.pr_number }}:"
          echo "${{ steps.pr.outputs.pr_url }}"
