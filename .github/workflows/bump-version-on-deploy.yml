# After a feature PR is merged into deploy:
# 1. Detect whether the merge changed frontend and/or backend files
# 2. Bump the app version and push
# 3. After bump completes, trigger deploy workflows (bot pushes do not re-fire push workflows)
name: Bump version on deploy

on:
  push:
    branches:
      - deploy

jobs:
  detect-changes:
    if: |
      ${{ !contains(github.event.head_commit.message, 'chore: bump app version') }}
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      frontend: ${{ steps.detect.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Detect frontend and backend deploy needs
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/detect-deploy-changes.sh
          scripts/detect-deploy-changes.sh \
            "${{ github.event.before }}" \
            "${{ github.sha }}" \
            "${{ github.event.head_commit.message }}"

  bump-version:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      deploy_sha: ${{ steps.bump.outputs.deploy_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Bump semantic version on deploy
        id: bump
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/bump-app-version.js
          git add package.json package-lock.json public/app-version.json backend/package.json
          if git diff --staged --quiet; then
            echo "Version files already up to date."
          else
            git commit -m "chore: bump app version to 1.0.${GITHUB_RUN_NUMBER}"
            git push origin deploy
          fi
          git fetch origin deploy
          git checkout deploy
          echo "deploy_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  trigger-backend-deploy:
    needs: [detect-changes, bump-version]
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger backend deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run deploy_khonofy-backend-api.yml \
            --ref deploy \
            -f deploy_sha="${{ needs.bump-version.outputs.deploy_sha }}"
          echo "Triggered backend deploy for ${{ needs.bump-version.outputs.deploy_sha }}."

  trigger-frontend-deploy:
    needs: [detect-changes, bump-version]
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger frontend deploy workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run azure-static-web-apps-polite-smoke-0f9de4610.yml \
            --ref deploy \
            -f deploy_sha="${{ needs.bump-version.outputs.deploy_sha }}"
          echo "Triggered frontend deploy for ${{ needs.bump-version.outputs.deploy_sha }}."

  no-deploy-needed:
    needs: [detect-changes, bump-version]
    if: |
      needs.detect-changes.outputs.backend != 'true' &&
      needs.detect-changes.outputs.frontend != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No frontend or backend deploy workflows required for this merge."
