# After a feature PR is merged into deploy:
# 1. Detect whether the merge changed frontend and/or backend files
# 2. Bump the app version and push
# 3. Explicitly trigger deploy workflows (bot pushes do not re-fire push workflows)
name: Bump version on deploy

on:
  push:
    branches:
      - deploy

jobs:
  bump-version:
    if: |
      ${{ !contains(github.event.head_commit.message, 'chore: bump app version') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Detect frontend and backend changes in merge
        uses: dorny/paths-filter@v3
        id: changes
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/deploy_khonofy-backend-api.yml'
            frontend:
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.js'
              - 'tailwind.config.js'
              - 'postcss.config.js'
              - 'components.json'
              - 'jsconfig.json'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - '.github/workflows/azure-static-web-apps-polite-smoke-0f9de4610.yml'

      - name: Bump semantic version on deploy
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          node scripts/bump-app-version.js
          git add package.json package-lock.json public/app-version.json backend/package.json
          if git diff --staged --quiet; then
            echo "Version files already up to date."
            exit 0
          fi
          git commit -m "chore: bump app version to 1.0.${GITHUB_RUN_NUMBER}"
          git push origin deploy

      - name: Trigger backend deploy workflow
        if: steps.changes.outputs.backend == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy_khonofy-backend-api.yml --ref deploy
          echo "Triggered backend deploy on deploy branch."

      - name: Trigger frontend deploy workflow
        if: steps.changes.outputs.frontend == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run azure-static-web-apps-polite-smoke-0f9de4610.yml --ref deploy
          echo "Triggered frontend deploy on deploy branch."

      - name: No deploy workflows needed
        if: steps.changes.outputs.backend != 'true' && steps.changes.outputs.frontend != 'true'
        run: echo "Merge did not change frontend or backend deploy paths."
