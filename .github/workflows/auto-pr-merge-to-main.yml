name: Auto PR and merge to main

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to merge into main
        required: true
        type: string

concurrency:
  group: auto-pr-merge-${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  open-and-merge-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve source branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request to main
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail

          AHEAD_BY="$(gh api "/repos/${GITHUB_REPOSITORY}/compare/main...${BRANCH}" --jq '.ahead_by')"
          if [ "${AHEAD_BY}" -eq 0 ]; then
            echo "No commits to merge from ${BRANCH} into main."
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "should_merge=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          EXISTING_PR="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${EXISTING_PR}" ]; then
            echo "Found open PR #${EXISTING_PR} for ${BRANCH}"
            echo "number=${EXISTING_PR}" >> "$GITHUB_OUTPUT"
            echo "should_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh pr create \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${BRANCH}" \
            --title "Merge ${BRANCH} into main" \
            --body "$(cat <<EOF
          Automated pull request opened after a push to \`${BRANCH}\`.

          This PR was created by the **Auto PR and merge to main** workflow.
          EOF
          )"

          PR_NUMBER="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head "${BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          echo "Created PR #${PR_NUMBER} for ${BRANCH}"
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "should_merge=true" >> "$GITHUB_OUTPUT"

      - name: Merge pull request into main
        if: steps.create-pr.outputs.should_merge == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.number }}
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER}" ]; then
            echo "No pull request number found."
            exit 1
          fi

          gh pr merge "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --merge \
            --delete-branch=false

          echo "Merged PR #${PR_NUMBER} into main."
