# Feature branch push -> open PR into deploy -> auto-merge.
# Merge into deploy triggers backend and/or frontend Azure workflows (path-filtered).
# After deploy completes, deploy is promoted to main via PR (in those workflows).
name: Auto PR merge to deploy

on:
  push:
    branches-ignore:
      - main
      - deploy
  workflow_dispatch:
    inputs:
      branch:
        description: Feature branch to merge into deploy
        required: true
        type: string

concurrency:
  group: auto-pr-via-deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  promote-via-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve source branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR and merge into deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ steps.branch.outputs.name }}
          TARGET_BRANCH: deploy
        run: |
          set -euo pipefail

          AHEAD_BY="$(gh api "/repos/${GITHUB_REPOSITORY}/compare/${TARGET_BRANCH}...${SOURCE_BRANCH}" --jq '.ahead_by')"
          if [ "${AHEAD_BY}" -eq 0 ]; then
            echo "No commits to merge from ${SOURCE_BRANCH} into ${TARGET_BRANCH}."
            exit 0
          fi

          EXISTING_PR="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base "${TARGET_BRANCH}" \
            --head "${SOURCE_BRANCH}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${TARGET_BRANCH}" \
              --head "${SOURCE_BRANCH}" \
              --title "Merge ${SOURCE_BRANCH} into ${TARGET_BRANCH}" \
              --body "Automated PR promoting \`${SOURCE_BRANCH}\` into \`${TARGET_BRANCH}\`."

            EXISTING_PR="$(gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base "${TARGET_BRANCH}" \
              --head "${SOURCE_BRANCH}" \
              --state open \
              --json number \
              --jq '.[0].number')"
          fi

          gh pr merge "${EXISTING_PR}" \
            --repo "${GITHUB_REPOSITORY}" \
            --merge \
            --delete-branch=false

          echo "Merged PR #${EXISTING_PR}: ${SOURCE_BRANCH} -> ${TARGET_BRANCH}"
