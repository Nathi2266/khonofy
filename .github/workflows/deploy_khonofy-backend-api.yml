# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# Runs on deploy (and main) when backend files change. Last job opens PR deploy -> main.

name: Build and deploy Node.js app to Azure Web App - khonofy-backend-api

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy_khonofy-backend-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log app version
        run: |
          node -e "const v=require('./public/app-version.json'); console.log('Deploying backend release', v.full || v.version)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Attach app version to backend package
        run: cp public/app-version.json backend/app-version.json

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'khonofy-backend-api'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B7E4F49AD4D84AE383D97EFA095E3875 }}

  open-pr-to-main:
    needs: deploy
    if: |
      needs.deploy.result == 'success' &&
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0

      - name: Open PR from deploy to main when deploys are done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SELF_WORKFLOW: backend
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          chmod +x scripts/open-deploy-pr-to-main.sh
          scripts/open-deploy-pr-to-main.sh
