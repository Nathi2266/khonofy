# Runs on push to deploy (and main) when frontend files change: version, build, Azure deploy, then PR to main.
name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - deploy
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'components.json'
      - 'jsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/azure-static-web-apps-polite-smoke-0f9de4610.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - deploy
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'vite.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - 'components.json'
      - 'jsconfig.json'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/azure-static-web-apps-polite-smoke-0f9de4610.yml'

jobs:
  set-app-version:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Set app version
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Generate build version
        id: version
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BUILD_VERSION="khonofy@1.0.pr${{ github.event.pull_request.number }}+${SHORT_SHA}"
          else
            BUILD_VERSION="khonofy@1.0.${GITHUB_RUN_NUMBER}+${SHORT_SHA}"
          fi
          echo "app_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Build version: ${BUILD_VERSION}"

  build_and_deploy_job:
    needs: set-app-version
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_APP_VERSION: ${{ needs.set-app-version.outputs.app_version }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_RELEASE: ${{ needs.set-app-version.outputs.app_version }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_SMOKE_0F9DE4610 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          app_build_command: "npm run build"
          github_id_token: ${{ steps.idtoken.outputs.result }}

  sync-version-to-main:
    needs: [set-app-version, build_and_deploy_job]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/deploy'
    runs-on: ubuntu-latest
    name: Sync version to main
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: deploy
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Write version files
        env:
          APP_VERSION: ${{ needs.set-app-version.outputs.app_version }}
          BUILD_NUMBER: ${{ github.run_number }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          export DISPLAY_VERSION="${APP_VERSION#khonofy@}"
          export SEMVER="1.0.${BUILD_NUMBER}"
          export UPDATED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          node <<'NODE'
          const fs = require('fs');
          const displayVersion = process.env.DISPLAY_VERSION;
          const semver = process.env.SEMVER;
          const appVersion = process.env.APP_VERSION;
          const buildNumber = Number(process.env.BUILD_NUMBER);
          const shortSha = process.env.SHORT_SHA.slice(0, 7);
          const updatedAt = process.env.UPDATED_AT;

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = semver;
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);

          const versionFile = {
            version: displayVersion,
            full: appVersion,
            build: buildNumber,
            sha: shortSha,
            updatedAt,
          };
          fs.writeFileSync('public/app-version.json', `${JSON.stringify(versionFile, null, 2)}\n`);
          NODE

      - name: Commit version bump to deploy
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet package.json public/app-version.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version files already up to date."
            exit 0
          fi

          git add package.json public/app-version.json
          git commit -m "chore: bump app version to ${{ needs.set-app-version.outputs.app_version }} [skip ci]"
          git push origin deploy
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open and merge PR from deploy to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          AHEAD_BY="$(gh api "/repos/${GITHUB_REPOSITORY}/compare/main...deploy" --jq '.ahead_by')"
          if [ "${AHEAD_BY}" -eq 0 ]; then
            echo "deploy is already in sync with main."
            exit 0
          fi

          EXISTING_PR="$(gh pr list \
            --repo "${GITHUB_REPOSITORY}" \
            --base main \
            --head deploy \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          if [ -z "${EXISTING_PR}" ]; then
            gh pr create \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head deploy \
              --title "Release ${{ needs.set-app-version.outputs.app_version }} to main" \
              --body "Automated version sync after Azure frontend deploy.

          Version: \`${{ needs.set-app-version.outputs.app_version }}\`"

            EXISTING_PR="$(gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --base main \
              --head deploy \
              --state open \
              --json number \
              --jq '.[0].number')"
          fi

          gh pr merge "${EXISTING_PR}" \
            --repo "${GITHUB_REPOSITORY}" \
            --merge \
            --delete-branch=false

          echo "Merged PR #${EXISTING_PR}: deploy -> main"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_SMOKE_0F9DE4610 }}
          action: "close"
          app_location: "/"
