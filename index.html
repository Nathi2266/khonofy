<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Khonology - Khonofy</title>
    <script>
      (function () {
        var key = 'khonofy_ui_scale';
        var scale = parseFloat(localStorage.getItem(key));
        if (!isFinite(scale)) scale = 0.85;
        scale = Math.min(1, Math.max(0.6, scale));
        document.documentElement.style.setProperty('--ui-scale', String(scale));
        document.documentElement.dataset.uiScale = String(scale);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
